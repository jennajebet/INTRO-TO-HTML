<!DOCTYPE html>
<html>
    <head>
        <script>
            function validateForm() {
                var x = document.forms["myForm"]["fname"].value;
                if(x == "") {
                    alert("Fill in!!!!");
                    return false;
                }
            }
        </script>
    </head>
    <body>
        <form name="myForm" onsubmit="validateForm()">
            name: <input type="text" name="fname">
            <input type="submit" value="Submit">
            <p id="message"></p>
        </form>
    </body>
</html>
